{% extends 'base/base.html' %}

{% block title %}Add User - VisitPlanner{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add New User</h2>
    <a href="{% url 'user_list' %}" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back to Users</a>
</div>

<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="card-header">
        <h3 class="card-title">User Profile Details</h3>
    </div>
    <div class="card-body">
        <form method="POST" action="{% url 'user_create' %}">
            {% csrf_token %}
            
            <div class="grid md:grid-cols-2 grid-cols-1">
                <div class="form-group">
                    <label class="form-label" for="id_name">Full Name <span style="color: var(--danger);">*</span></label>
                    <input type="text" name="name" id="id_name" class="form-control" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="id_email">Email Address <span style="color: var(--danger);">*</span></label>
                    <input type="email" name="email" id="id_email" class="form-control" required placeholder="john.doe@example.com">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="id_phone">Phone Number</label>
                    <input type="tel" name="phone" id="id_phone" class="form-control" placeholder="+1...">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="id_designation">Designation</label>
                    <select name="designation" id="id_designation" class="form-control">
                        <option value="field_agent">Field Agent</option>
                        <option value="coordinator">Coordinator</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label" for="id_address">Address</label>
                    <input type="text" name="address" id="id_address" class="form-control" placeholder="123 Main St...">
                </div>
                
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label" for="id_event">Assign to Event (Optional)</label>
                    <select name="event" id="id_event" class="form-control">
                        <option value="">-- No Event Assignment --</option>
                        <option value="1">Annual Tech Conference</option>
                        <option value="2">Field Visit Briefing</option>
                    </select>
                </div>
            </div>
            
            <div class="form-actions" style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <a href="#" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Save User</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

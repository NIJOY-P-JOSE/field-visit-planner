{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-6 sm:py-10">
    
    <div class="mb-8 text-center sm:text-left">
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Create New Event</h1>
        <p class="text-slate-500 mt-2">Set up a new field visit operation or campaign.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
        <form method="POST" action="{% url 'create_event' %}" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Event Name</label>
                <input type="text" name="name" id="name" required
                    class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 focus:bg-white transition-all duration-200"
                    placeholder="e.g., Downtown Residential Survey">
            </div>

            <div>
                <label for="date" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Event Date</label>
                <input type="date" name="date" id="date" required
                    class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 focus:bg-white transition-all duration-200">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Description</label>
                <textarea name="description" id="description" rows="4" required
                    class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 focus:bg-white transition-all duration-200 resize-y"
                    placeholder="Provide instructions or goals for the participating teams..."></textarea>
            </div>

            <div class="pt-4 flex items-center justify-end gap-4 border-t border-slate-100 mt-8">
                <a href="{% url 'events' %}" class="text-slate-500 hover:text-slate-700 font-medium px-4 py-2 transition-colors">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl shadow-sm hover:shadow focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200">
                    Create Event
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

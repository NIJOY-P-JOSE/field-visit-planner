{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto py-8 sm:py-12">
    
    <div class="mb-8 text-center sm:text-left">
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Create New Team</h1>
        <p class="text-slate-500 mt-2">Assemble a new group of volunteers for field visits.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
        <form method="POST" action="{% url 'create_team' %}" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="team_name" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Team Name</label>
                <input type="text" name="team_name" id="team_name" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200"
                    placeholder="e.g., Alpha Squad">
            </div>

            <div>
                <label for="event_id" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Assign to Event</label>
                <div class="relative">
                    <select name="event_id" id="event_id" required
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200">
                        <option value="" disabled selected>Select an ongoing event...</option>
                        {% for event in events %}
                            <option value="{{ event.id }}">{{ event.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div>
                <label for="leader_id" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Team Leader</label>
                <div class="relative">
                    <select name="leader_id" id="leader_id" required
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200">
                        <option value="" disabled selected>Select a volunteer...</option>
                        {% for leader in leaders %}
                            <option value="{{ leader.id }}">{{ leader.get_full_name|default:leader.username }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="pt-6 mt-6 border-t border-slate-100 flex items-center justify-end gap-4">
                <a href="{% url 'create_team' %}" class="text-slate-500 hover:text-slate-700 font-medium px-4 py-2 transition-colors">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-xl shadow-sm hover:shadow focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200">
                    Create Team
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

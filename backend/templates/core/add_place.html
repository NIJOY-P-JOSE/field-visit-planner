{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-8 sm:py-12">
    
    <div class="mb-8 text-center sm:text-left">
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Add New Place</h1>
        <p class="text-slate-500 mt-2">Register a location, invitee, or household for field visits.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
        <form method="POST" action="{% url 'add_place' %}" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Name / Primary Contact</label>
                <input type="text" name="name" id="name" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200"
                    placeholder="e.g., Jane Doe or The Smith Residence">
            </div>

            <div>
                <label for="address" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Full Address</label>
                <textarea name="address" id="address" rows="3" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200 resize-y"
                    placeholder="123 Main St, Apt 4B, City, State, ZIP"></textarea>
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Phone Number (Optional)</label>
                <input type="tel" name="phone" id="phone"
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200"
                    placeholder="(555) 123-4567">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-slate-100 pt-6 mt-6">
                <div>
                    <label for="event_id" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Campaign / Event</label>
                    <div class="relative">
                        <select name="event_id" id="event_id" required
                            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200">
                            <option value="" disabled selected>Select an Event...</option>
                            {% for event in events %}
                                <option value="{{ event.id }}">{{ event.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label for="team_id" class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">Assign to Team</label>
                    <div class="relative">
                        <select name="team_id" id="team_id" required
                            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 focus:bg-white transition-all duration-200">
                            <option value="" disabled selected>Select a Team...</option>
                            {% for team in teams %}
                                <option value="{{ team.id }}">{{ team.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-6 mt-6 border-t border-slate-100 flex items-center justify-end gap-4">
                <a href="{% url 'places' %}" class="text-slate-500 hover:text-slate-700 font-medium px-4 py-2 transition-colors">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-xl shadow-sm hover:shadow focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200">
                    Add Place
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

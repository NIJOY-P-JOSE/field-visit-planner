{% if not hide_navbar %}
<nav class="navbar">
    <a href="{% url 'dashboard' %}" class="navbar-brand">
        <i class="fa-solid fa-layer-group"></i> VisitPlanner
    </a>
    
    <div class="mobile-toggle" onclick="document.getElementById('navLinks').classList.toggle('active')">
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="navbar-links" id="navLinks">
        <a href="{% url 'dashboard' %}" class="navbar-link"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="{% url 'event_list' %}" class="navbar-link"><i class="fa-solid fa-calendar-alt"></i> Events</a>
        <a href="{% url 'place_list' %}" class="navbar-link"><i class="fa-solid fa-location-dot"></i> Places</a>
        <a href="{% url 'team_list' %}" class="navbar-link"><i class="fa-solid fa-users"></i> Teams</a>
        <a href="{% url 'user_list' %}" class="navbar-link"><i class="fa-solid fa-user-tie"></i> Users</a>
        <a href="{% url 'plan_create' %}" class="navbar-link"><i class="fa-solid fa-route"></i> Planning</a>
    </div>

    <div class="navbar-profile">
        <div class="profile-avatar">
            <i class="fa-solid fa-user"></i>
        </div>
        <span class="navbar-link" style="padding:0">{{ request.user.username|default:"Admin" }} <i class="fa-solid fa-chevron-down" style="font-size:0.75rem"></i></span>
        <div class="dropdown-menu">
            <a href="{% url 'user_profile' %}" class="dropdown-item"><i class="fa-regular fa-user"></i> Profile</a>
            <a href="{% url 'change_password' %}" class="dropdown-item"><i class="fa-solid fa-key"></i> Settings</a>
            <hr style="border:none; border-top:1px solid var(--border-color); margin: 0.25rem 0;">
            <!-- Dummy logout link replacing with login for now since logout url is not defined in user urls.py -->
            <a href="{% url 'login' %}" class="dropdown-item" style="color: var(--danger);"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
</nav>
{% endif %}

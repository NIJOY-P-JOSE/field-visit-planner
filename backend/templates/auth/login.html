{% extends 'base/base.html' %}

{% block title %}Login - VisitPlanner{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, var(--bg-color) 0%, #e0e7ff 100%);
        justify-content: center;
        align-items: center;
    }
    .navbar { display: none; } /* Hide navbar via css for login */
    .main-container {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }
    .login-card {
        max-width: 400px;
        width: 100%;
        padding: 2.5rem 2rem;
        background: var(--surface);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
    }
    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .login-brand {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--primary);
        background: var(--gradient-accent);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
    }
    .login-subtitle {
        color: var(--text-muted);
        font-size: 0.875rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <div class="login-header">
        <div class="login-brand">
            <i class="fa-solid fa-map-location-dot"></i> VisitPlanner
        </div>
        <div class="login-subtitle">Sign in to your account</div>
    </div>
    
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="username">Username or Email</label>
            <input type="text" name="username" id="username" class="form-control" required placeholder="Enter your username">
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; margin-bottom: 1.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--text-muted); cursor: pointer;">
                <input type="checkbox" name="remember" style="accent-color: var(--primary);"> Remember me
            </label>
            <a href="#" style="font-size: 0.875rem; color: var(--primary); font-weight: 500;">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">
            Login <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>
</div>
{% endblock %}

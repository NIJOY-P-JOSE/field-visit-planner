{% extends 'base/base.html' %}

{% block title %}Change Password - VisitPlanner{% endblock %}

{% block content %}
<div class="page-header" style="justify-content: center; text-align: center; margin-top: 2rem;">
    <h2>Change Password</h2>
</div>

<div style="max-width: 500px; margin: 0 auto; margin-bottom: 4rem;">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Update Security Credentials</h3>
        </div>
        <div class="card-body">
            <form method="POST" action="{% url 'change_password' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="old_password" class="form-control" required placeholder="Enter current password">
                </div>
                
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" required placeholder="Enter new password">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required placeholder="Confirm new password">
                </div>
                
                <div class="form-actions" style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-key"></i> Update Password</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
